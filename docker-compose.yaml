version: "3.9"

services:
  api:
    build: .
    container_name: insurance_ai_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./uploads:/app/uploads
      - ./chroma_data:/app/chroma_data
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: insurance_ai_db
    environment:
      POSTGRES_DB: insurance_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: